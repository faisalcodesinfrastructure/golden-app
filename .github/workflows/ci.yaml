name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Verify build
        run: go build ./cmd/server

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          IMAGE_TAG="sha-${SHORT_SHA}"
          FULL_IMAGE="ghcr.io/${{ github.repository_owner }}/golden-app:${IMAGE_TAG}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "Image will be: ${FULL_IMAGE}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in values.yaml
        run: |
          NEW_TAG="${{ steps.meta.outputs.tag }}"
          VALUES_FILE="helm/golden-app/values.yaml"
          echo "Updating image tag to: ${NEW_TAG}"
          sed -i "s|tag:.*|tag: \"${NEW_TAG}\"|" "${VALUES_FILE}"
          echo "Updated values.yaml:"
          grep "tag:" "${VALUES_FILE}"

      - name: Commit and push updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/golden-app/values.yaml
          if git diff --cached --quiet; then
            echo "No changes to values.yaml — skipping commit"
          else
            git commit -m "ci: update image tag to ${{ steps.meta.outputs.tag }} [skip ci]"
            git push origin main
            echo "Pushed updated values.yaml to main"
          fi
